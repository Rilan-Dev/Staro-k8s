---
# PV for Redis persistence (optional, for Celery result backend)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv-worker1
  labels:
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: cache
    type: local
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /var/lib/k8s-pv/redis
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - wd10318023672batchahajagmailcoma0uqu
