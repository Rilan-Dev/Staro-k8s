# =====================================================
# POSTGRESQL STATEFULSET
# Production-grade PostgreSQL with persistence
# =====================================================
# Features:
# - Ordered pod management
# - Stable network identity
# - Persistent storage
# - Health checks
# - Resource limits
# =====================================================

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: prod-database
  labels:
    app: postgres
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: database
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: metrics
      port: 9187
      targetPort: 9187

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: prod-database
  labels:
    app: postgres
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: staro-modular
        app.kubernetes.io/component: database
      annotations:
        # Prometheus metrics scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      terminationGracePeriodSeconds: 60
      nodeSelector:
        nodepool: workers
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: postgres-secrets
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            # Tuning for multi-tenant workloads
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8 --locale=en_US.UTF-8"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
        
        # PostgreSQL Exporter for Prometheus metrics
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_EXPORTER_DSN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: postgres
      spec:
        storageClassName: local-storage
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi

---
# PostgreSQL configuration for multi-tenant optimization
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: prod-database
  labels:
    app: postgres
data:
  postgresql.conf: |
    # =====================================================
    # PostgreSQL Configuration for Multi-Tenant SaaS
    # =====================================================
    
    # Connection Settings
    listen_addresses = '*'
    max_connections = 500
    superuser_reserved_connections = 5
    
    # Memory Settings (adjust based on available RAM)
    shared_buffers = 1GB
    effective_cache_size = 3GB
    maintenance_work_mem = 256MB
    work_mem = 16MB
    
    # Write Ahead Log
    wal_level = replica
    max_wal_senders = 5
    wal_keep_size = 1GB
    archive_mode = off
    
    # Query Planner
    random_page_cost = 1.1
    effective_io_concurrency = 200
    
    # Logging
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_rotation_age = 1d
    log_rotation_size = 100MB
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_statement = 'ddl'
    
    # Autovacuum (critical for multi-tenant with frequent updates)
    autovacuum = on
    autovacuum_max_workers = 4
    autovacuum_naptime = 30s
    autovacuum_vacuum_threshold = 50
    autovacuum_analyze_threshold = 50
    autovacuum_vacuum_scale_factor = 0.05
    autovacuum_analyze_scale_factor = 0.02
    
    # Statement timeout (prevent runaway queries)
    statement_timeout = 60000
    
    # Timezone
    timezone = 'Asia/Dubai'
