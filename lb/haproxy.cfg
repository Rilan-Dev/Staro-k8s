# =====================================================
# HAPROXY LOAD BALANCER CONFIGURATION
# For master node: wd168220237205batchahajagmailcomrchf3
# =====================================================
# Cluster Topology:
# - Master: 10.200.0.1 (WireGuard)
# - VPS Workers (Primary): 10.200.0.12, 10.200.0.13
# - Home Workers (Backup): 10.200.0.3, 10.200.0.2
# - Ingress NodePorts: HTTP=7058, HTTPS=11053
# =====================================================
# Installation:
# sudo dnf install -y haproxy
# sudo cp haproxy.cfg /etc/haproxy/haproxy.cfg
# sudo haproxy -c -f /etc/haproxy/haproxy.cfg
# sudo systemctl enable --now haproxy
# =====================================================

global
    daemon
    maxconn 50000
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    
    # SSL settings
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    tune.ssl.default-dh-param 2048

defaults
    mode tcp
    log global
    option tcplog
    option dontlognull
    option tcp-check
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    retries 3

# =====================================================
# HTTP Frontend (Port 80)
# =====================================================
frontend fe_http
    bind *:80
    mode tcp
    default_backend be_ingress_http

backend be_ingress_http
    mode tcp
    balance roundrobin
    option tcp-check
    
    # Primary: VPS workers (always preferred)
    server wd103-vps-primary 10.200.0.12:7058 check inter 5s fall 3 rise 2 weight 100
    server wd180-vps-primary 10.200.0.13:7058 check inter 5s fall 3 rise 2 weight 100
    
    # Backup: Home workers (only used if VPS workers are down)
    server kube01-home-backup 10.200.0.3:7058 check inter 10s fall 3 rise 2 backup weight 50
    server techadmin-home-backup 10.200.0.2:7058 check inter 10s fall 3 rise 2 backup weight 50

# =====================================================
# HTTPS Frontend (Port 443)
# =====================================================
frontend fe_https
    bind *:443
    mode tcp
    default_backend be_ingress_https

backend be_ingress_https
    mode tcp
    balance roundrobin
    option tcp-check
    
    # Primary: VPS workers (always preferred)
    server wd103-vps-primary 10.200.0.12:11053 check inter 5s fall 3 rise 2 weight 100
    server wd180-vps-primary 10.200.0.13:11053 check inter 5s fall 3 rise 2 weight 100
    
    # Backup: Home workers (only used if VPS workers are down)
    server kube01-home-backup 10.200.0.3:11053 check inter 10s fall 3 rise 2 backup weight 50
    server techadmin-home-backup 10.200.0.2:11053 check inter 10s fall 3 rise 2 backup weight 50

# =====================================================
# Stats Page (for monitoring)
# Access at http://<master-external-ip>:8404/stats
# =====================================================
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats auth admin:CHANGE_THIS_PASSWORD
    stats show-legends
    stats show-node

# =====================================================
# Health Check Endpoint
# For external monitoring systems
# =====================================================
frontend health
    bind *:8405
    mode http
    monitor-uri /health

# =====================================================
# CONFIGURATION NOTES:
# =====================================================
# 
# 'backup' keyword:
#   - Home workers marked as 'backup' only receive traffic 
#     when ALL primary servers are down
#   - This prevents home network issues from affecting production
#
# 'weight' keyword:
#   - Primary servers have weight 100 (full traffic)
#   - Backup servers have weight 50 (reduced load when active)
#
# 'inter' keyword:
#   - VPS workers checked every 5s (faster failover)
#   - Home workers checked every 10s (less aggressive)
#
# To manually enable a backup server:
#   echo "enable server be_ingress_https/kube01-home-backup" | socat stdio /run/haproxy/admin.sock
#
# To view server status:
#   echo "show servers state" | socat stdio /run/haproxy/admin.sock
# =====================================================
