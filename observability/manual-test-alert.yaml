apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: manual-test-alert
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: test.rules
      rules:
        - alert: TestAlert
          expr: vector(1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "This is a test alert from Prometheus"
