apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-relay
  namespace: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-relay
  template:
    metadata:
      labels:
        app: notification-relay
    spec:
      containers:
        - name: relay
          image: riluraafu/notification-relay:1.0.3
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ALERT_RELAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notification-relay-secret
                  key: alert-token

            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notification-relay-secret
                  key: telegram-token

            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: notification-relay-secret
                  key: telegram-chat-id

          volumeMounts:
            - name: code
              mountPath: /app/main.py
              subPath: main.py

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

      volumes:
        - name: code
          configMap:
            name: notification-relay-code
