# =====================================================
# PROMETHEUS STACK HELM VALUES
# Production configuration for kube-prometheus-stack
# =====================================================
# Installation:
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm repo update
# helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   -n observability --create-namespace -f prometheus-values.yaml
# =====================================================


# Global settings
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true


# Alertmanager configuration
alertmanager:
  enabled: true

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.ostechnologies.info
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.ostechnologies.info

  alertmanagerSpec:
    replicas: 1
    retention: 120h

    secrets:
      - alertmanager-relay-secret

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: telegram-warning
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        - matchers:
            - severity="critical"
          receiver: telegram-critical

        - matchers:
            - severity="warning"
          receiver: telegram-warning

    receivers:
      - name: telegram-warning
        webhook_configs:
          - url: http://notification-relay.observability.svc.cluster.local:8080/alerts
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secrets/alertmanager-relay-secret/bearer-token

      - name: telegram-critical
        webhook_configs:
          - url: http://notification-relay.observability.svc.cluster.local:8080/alerts
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secrets/alertmanager-relay-secret/bearer-token


