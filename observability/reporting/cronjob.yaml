apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-report
  namespace: observability
spec:
  schedule: "55 23 * * *"  # Run daily at 23:55
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: reporter
            image: python:3.11-slim
            command: ["/bin/sh", "-c"]
            args:
              - pip install requests && python /app/daily-report.py
            env:
              - name: ALERT_RELAY_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: notification-relay-secret
                    key: alert-token
            volumeMounts:
              - name: script
                mountPath: /app/daily-report.py
                subPath: daily-report.py
          volumes:
            - name: script
              configMap:
                name: daily-report-script
          restartPolicy: OnFailure

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: daily-report-script
  namespace: observability
data:
  daily-report.py: |
    # (Content will be replaced by script file content)
    import requests
    import time
    from datetime import datetime
    import os

    PROMETHEUS_URL = os.getenv("PROMETHEUS_URL", "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090")
    RELAY_URL = os.getenv("RELAY_URL", "http://notification-relay.observability.svc.cluster.local:8080/message")
    TOKEN = os.getenv("ALERT_RELAY_TOKEN")

    def query_prom(query):
        try:
            response = requests.get(f"{PROMETHEUS_URL}/api/v1/query", params={"query": query})
            data = response.json()
            if data["status"] == "success" and data["data"]["result"]:
                return float(data["data"]["result"][0]["value"][1])
        except Exception as e:
            print(f"Error querying {query}: {e}")
        return 0.0

    def get_stats():
        now = time.time()
        
        # Current resource usage (average over last 24h)
        cpu_usage = query_prom('avg(sum(rate(node_cpu_seconds_total{mode!="idle"}[24h])) by (instance)) * 100')
        mem_usage = query_prom('avg(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100')
        disk_usage = query_prom('avg(node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100')
        
        # Previous 24h (offset 1d)
        prev_cpu = query_prom('avg(sum(rate(node_cpu_seconds_total{mode!="idle"}[24h] offset 1d)) by (instance)) * 100')
        prev_mem = query_prom('avg(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 offset 1d')

        return {
            "cpu": cpu_usage,
            "mem": 100 - mem_usage, # Convert available to used
            "disk": 100 - disk_usage, # Convert available to used
            "prev_cpu": prev_cpu,
            "prev_mem": 100 - prev_mem
        }

    def send_report(report):
        headers = {"Authorization": f"Bearer {TOKEN}"}
        payload = {"text": report}
        try:
            resp = requests.post(RELAY_URL, json=payload, headers=headers)
            print(f"Sent report: {resp.status_code} - {resp.text}")
        except Exception as e:
            print(f"Failed to send report: {e}")

    def main():
        stats = get_stats()
        
        cpu_change = stats['cpu'] - stats['prev_cpu']
        mem_change = stats['mem'] - stats['prev_mem']
        
        cpu_arrow = "⬆️" if cpu_change > 0 else "⬇️"
        mem_arrow = "⬆️" if mem_change > 0 else "⬇️"

        report = (
            f"📊 **Daily System Report** ({datetime.now().strftime('%Y-%m-%d')})\n\n"
            f"**CPU Usage**: {stats['cpu']:.1f}% ({cpu_arrow} {abs(cpu_change):.1f}%)\n"
            f"**RAM Usage**: {stats['mem']:.1f}% ({mem_arrow} {abs(mem_change):.1f}%)\n"
            f"**Disk Usage**: {stats['disk']:.1f}%\n\n"
            f"_Comparing last 24h vs previous day_"
        )
        
        print(report)
        send_report(report)

    if __name__ == "__main__":
        main()
