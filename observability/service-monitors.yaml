---
# PrometheusRule for alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: staro-modular-alerts
  namespace: observability
  labels:
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: alerting
    release: kube-prometheus-stack
spec:
  groups:
    - name: staro-modular.rules
      rules:
        # High error rate alert
        - alert: HighErrorRate
          expr: |
            sum(rate(django_http_requests_total{status=~"5.."}[5m])) 
            / sum(rate(django_http_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
        
        # High response time alert
        - alert: HighResponseTime
          expr: |
            histogram_quantile(0.95, 
              sum(rate(django_http_request_duration_seconds_bucket[5m])) by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High response time detected"
            description: "95th percentile response time is {{ $value }}s"
        
        # Database connection pool exhausted
        - alert: PgBouncerPoolExhausted
          expr: |
            pgbouncer_pools_client_waiting > 50
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PgBouncer connection pool exhausted"
            description: "{{ $value }} clients waiting for connections"
        
        # Celery queue backing up
        - alert: CeleryQueueBacklog
          expr: |
            flower_task_pending > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Celery task queue is backing up"
            description: "{{ $value }} tasks pending in queue"
        
        # Pod restart alert
        - alert: PodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"prod-.*"}[1h]) > 3
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is restarting frequently"
            description: "Pod has restarted {{ $value }} times in the last hour"
        
        # Disk space warning
        - alert: DiskSpaceWarning
          expr: |
            kubelet_volume_stats_available_bytes{namespace="prod-database"} 
            / kubelet_volume_stats_capacity_bytes{namespace="prod-database"} < 0.2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Database disk space low"
            description: "Only {{ $value | humanizePercentage }} disk space remaining"
