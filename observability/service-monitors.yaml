# =====================================================
# OBSERVABILITY STACK - PROMETHEUS, LOKI, GRAFANA
# Tenant-aware monitoring and logging
# =====================================================
# This file contains Kustomize/Helm values for deploying
# the observability stack. For production, use:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack -n observability -f prometheus-values.yaml
#   helm install loki grafana/loki-stack -n observability -f loki-values.yaml
# =====================================================

---
# Prometheus ServiceMonitor for Django API
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: django-api
  namespace: observability
  labels:
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: monitoring
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: django-api
  namespaceSelector:
    matchNames:
      - prod-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - targetLabel: job
          replacement: django

