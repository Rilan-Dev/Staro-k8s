# =====================================================
# CELERY DEPLOYMENT FOR HOME WORKERS
# Runs background/async tasks on home network workers
# =====================================================
# Home workers: kube01, techadmin-proliant-ml310e-gen8-v2
# These handle non-time-critical background processing
# =====================================================

---
# Celery Worker deployment for home workers
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-home
  namespace: prod-backend
  labels:
    app: celery-home
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: worker
    worker-location: home
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: celery-home
  template:
    metadata:
      labels:
        app: celery-home
        app.kubernetes.io/name: staro-modular
        app.kubernetes.io/component: worker
        worker-location: home
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9808"
    spec:
      # Target home workers only
      nodeSelector:
        location: home
      # Tolerate potential network issues
      tolerations:
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        # Wait for Redis
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until nc -z redis.prod-backend.svc.cluster.local 6379; do
                echo "Redis not ready, waiting..."
                sleep 5
              done
              echo "Redis is ready!"
        # Wait for Django (to ensure DB is migrated)
        - name: wait-for-django
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Django API..."
              until nc -z django-api.prod-backend.svc.cluster.local 8000; do
                echo "Django not ready, waiting..."
                sleep 5
              done
              echo "Django is ready!"
      containers:
        - name: celery
          image: ghcr.io/rilan-dev/staro_modular-api:Migrate_to_Product
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - staro_modular
            - worker
            - -l
            - INFO
            - --concurrency=2
            - -Q
            - default,low_priority,reports,notifications
            - -n
            - home-worker@%h
          envFrom:
            - secretRef:
                name: django-secrets
            - configMapRef:
                name: django-config
          env:
            - name: C_FORCE_ROOT
              value: "false"
            - name: CELERY_WORKER_PREFETCH_MULTIPLIER
              value: "2"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A staro_modular inspect ping -d celery@$POD_NAME
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---
# HPA for home Celery workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-home
  namespace: prod-backend
  labels:
    app: celery-home
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-home
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
