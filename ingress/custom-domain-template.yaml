# =====================================================
# CUSTOM DOMAIN INGRESS TEMPLATE
# Automated provisioning for tenant custom domains
# =====================================================
# This file serves as a template for the tenant-operator
# or provisioning script to create per-tenant ingresses
# for custom domains (e.g., www.tenant-business.com)
# =====================================================
#
# Usage: provision-tenant-domain.sh <tenant-slug> <custom-domain> <tenant-id>
#
# Variables to replace:
# - ${TENANT_SLUG} - URL-safe tenant identifier (e.g., "acme-corp")
# - ${CUSTOM_DOMAIN} - Tenant's custom domain (e.g., "www.acme-corp.com")
# - ${TENANT_ID} - UUID of the tenant

---
# Example: Custom domain ingress for a tenant
# This would be generated by the provisioning script
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tenant-${TENANT_SLUG}-custom
  namespace: prod-staro-modular
  labels:
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: custom-domain
    staro.io/tenant-id: "${TENANT_ID}"
    staro.io/tenant-slug: "${TENANT_SLUG}"
    staro.io/domain-type: "custom"
  annotations:
    # Use HTTP-01 challenge for custom domains (DNS not controlled by us)
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # NGINX configuration
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    
    # Rate limiting (can be customized per subscription tier)
    nginx.ingress.kubernetes.io/limit-rpm: "300"
    nginx.ingress.kubernetes.io/limit-connections: "30"
    
    # Pass tenant ID header for reliable resolution
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Force tenant resolution via header (custom domain can't use subdomain)
      proxy_set_header X-Tenant-Id "${TENANT_ID}";
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "${CUSTOM_DOMAIN}"
      secretName: tls-${TENANT_SLUG}
  rules:
    - host: "${CUSTOM_DOMAIN}"
      http:
        paths:
          # API backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: django-api
                port:
                  number: 8000
          # Django admin (optional for custom domains)
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: django-api
                port:
                  number: 8000
          # Media files
          - path: /media
            pathType: Prefix
            backend:
              service:
                name: django-api
                port:
                  number: 8000
          # Health check
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: staro-modular
                port:
                  number: 80
          # Frontend (tenant storefront)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: staro-modular
                port:
                  number: 80

---
# =====================================================
# SAMPLE: Ingress for a specific tenant (for testing)
# Remove or modify after template verification
# =====================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tenant-demo-corp-custom
  namespace: prod-staro-modular
  labels:
    app.kubernetes.io/name: staro-modular
    app.kubernetes.io/component: custom-domain
    staro.io/tenant-id: "demo-tenant-uuid"
    staro.io/tenant-slug: "demo-corp"
    staro.io/domain-type: "custom"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Tenant-Id "demo-tenant-uuid";
      proxy_set_header X-Original-Host $host;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "shop.democorp.example"
      secretName: tls-demo-corp
  rules:
    - host: "shop.democorp.example"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: django-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: staro-modular
                port:
                  number: 80
