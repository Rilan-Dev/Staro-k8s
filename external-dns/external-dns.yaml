#     app.kubernetes.io/name: external-dns
# type: Opaque
# stringData:
#   # REPLACE THIS with your actual Cloudflare API token
#   # Token needs Zone:DNS:Edit permission for ostechnologies.info
#   api-token: "PLACEHOLDER_REPLACE_WITH_REAL_TOKEN"
